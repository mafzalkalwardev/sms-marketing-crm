services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signalmint
      POSTGRES_PASSWORD: signalmint
      POSTGRES_DB: signalmint
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalmint"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
