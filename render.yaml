services:
  - type: web
    name: signalmint-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true
      - key: VONAGE_MOCK_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: signalmint-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"

databases:
  - name: signalmint-db
    plan: free
    databaseName: signalmint
    user: signalmint
